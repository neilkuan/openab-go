name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g., 0.4.0). Leave empty for auto-detect."
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if this push is a Release PR merge (skip if so)
        id: skip
        run: |
          HEAD_MSG=$(git log -1 --format=%s)
          if echo "$HEAD_MSG" | grep -qE '^Merge pull request .* from .*/release/v'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: this push is a Release PR merge ($HEAD_MSG)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for new commits since last tag
        if: steps.skip.outputs.skip != 'true'
        id: check
        run: |
          LAST_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname | grep -vE '-' | head -1)
          if [ -n "$LAST_TAG" ]; then
            COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
            echo "commits=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Last stable tag: $LAST_TAG, commits since: $COUNT"
          else
            echo "commits=999" >> "$GITHUB_OUTPUT"
            echo "No stable tag found, treating as first release"
          fi

      - name: Create or update Release PR
        # Let release.sh decide whether to create a new PR or rebase the
        # existing open release branch onto main — that way a fix merged after
        # the release PR was opened still lands in the release PR.
        if: steps.skip.outputs.skip != 'true' && steps.check.outputs.commits != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          ARGS=""
          if [ -n "${{ inputs.version }}" ]; then
            ARGS="--version ${{ inputs.version }}"
          fi

          ./scripts/release.sh $ARGS
