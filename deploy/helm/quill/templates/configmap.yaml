apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "quill.fullname" . }}-config
  labels:
    {{- include "quill.labels" . | nindent 4 }}
data:
  config.toml: |
    {{- if .Values.teams.enabled }}
    [teams]
    app_id = "${TEAMS_APP_ID}"
    app_secret = "${TEAMS_APP_SECRET}"
    tenant_id = "${TEAMS_TENANT_ID}"
    listen = {{ .Values.teams.listen | quote }}
    {{- with .Values.teams.allowedUserIds }}
    allowed_user_id = {{ toJson . }}
    {{- end }}
    {{- end }}

    {{- if .Values.discord.enabled }}
    [discord]
    bot_token = "${DISCORD_BOT_TOKEN}"
    {{- with .Values.discord.allowedChannels }}
    allowed_channels = {{ toJson . }}
    {{- end }}
    {{- end }}

    {{- if .Values.telegram.enabled }}
    [telegram]
    bot_token = "${TELEGRAM_BOT_TOKEN}"
    {{- with .Values.telegram.allowedChats }}
    allowed_chats = {{ toJson . }}
    {{- end }}
    {{- end }}

    [agent]
    command = {{ .Values.agent.command | quote }}
    args = {{ toJson .Values.agent.args }}
    working_dir = {{ .Values.agent.workingDir | quote }}

    [pool]
    max_sessions = {{ .Values.pool.maxSessions }}
    session_ttl_hours = {{ .Values.pool.sessionTTLHours }}

    {{- if .Values.api.enabled }}
    [api]
    enabled = true
    listen = {{ .Values.api.listen | quote }}
    {{- end }}
