{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "quill.fullname" . }}
  labels:
    {{- include "quill.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host }}
      {{- end }}
      http:
        paths:
          - path: /api/messages
            pathType: Exact
            backend:
              service:
                name: {{ include "quill.fullname" . }}
                port:
                  name: teams
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "quill.fullname" . }}
                port:
                  name: api
{{- end }}
